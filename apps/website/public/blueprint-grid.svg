<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <defs>
    <!-- Small grid lines -->
    <pattern id="small" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(99,108,168,0.07)" stroke-width="0.5"/>
    </pattern>
    <!-- Large grid lines -->
    <pattern id="large" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#small)"/>
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="rgba(99,108,168,0.12)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#large)"/>
</svg>
